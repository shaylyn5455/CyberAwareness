name: .NET Core Desktop Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Name: CyberAwareness.slnx  

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        # CHANGED: Updated to version 10 to match your project settings
        dotnet-version: 10.0.x 

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Restore the application
      run: msbuild $env:Solution_Name /t:Restore

    - name: Build the solution
      run: msbuild $env:Solution_Name /p:Configuration=Debug

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CyberAwareness-Build
        path: |
          **/bin/Debug/net10.0-windows/
          **/bin/Debug/net10.0/
