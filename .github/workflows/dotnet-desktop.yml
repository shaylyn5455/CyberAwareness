name: .NET Core Desktop Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Name: CyberAwareness.sln  # Matches your solution name

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET SDK
    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # Matches the version in your screenshots

    # Add MSBuild to the PATH
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # Restore dependencies (Fixes the "Metadata not found" errors)
    - name: Restore the application
      run: msbuild $env:Solution_Name /t:Restore

    # Build the entire solution
    - name: Build the solution
      run: msbuild $env:Solution_Name /p:Configuration=Debug

    # Upload the Build Output (The EXE and DLLs)
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CyberAwareness-Build
        path: |
          CyberAwareness_GUI/bin/Debug/
          CyberAwareness/bin/Debug/
